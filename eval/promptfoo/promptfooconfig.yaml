    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "billing@company.com"

  - description: "billing: duplicate charge resolution time"
    vars:
      query: "I was charged twice. When will I get my money back?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
