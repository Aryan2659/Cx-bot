  - description: "billing: annual plan cancellation refund"
    vars:
      query: "I want to cancel my annual plan early. Will I get a refund?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
