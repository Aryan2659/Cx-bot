# CX Bot — PromptFoo Eval Suite
# 55 test cases: billing (20), returns (20), escalation (10), edge cases (5)
# Run: npx promptfoo eval --config eval/promptfoo/promptfooconfig.yaml

description: "CX Bot accuracy, hallucination, routing, and latency evaluation"

providers:
  - id: file://provider.js

# Single pass-through prompt — the actual query is in each test's vars
prompts:
  - "{{query}}"

# Default vars applied to all tests unless overridden
defaultTest:
  vars:
    min_confidence: "0.60"
    max_latency_ms: "8000"   # generous for free-tier CPU; tighten once you have GPU
  assert:
    # Every test must have a source citation (hallucination guard)
    - type: javascript
      value: |
        const { assertHasSource } = require('./assertions.js');
        return assertHasSource({ output, context });
    # Every test must be under latency threshold
    - type: javascript
      value: |
        const { assertLatency } = require('./assertions.js');
        return assertLatency({ output, context });
    # Every test must meet minimum confidence
    - type: javascript
      value: |
        const { assertConfidence } = require('./assertions.js');
        return assertConfidence({ output, context });
    # Every test checks for fabricated facts
    - type: javascript
      value: |
        const { assertNoFabricatedFacts } = require('./assertions.js');
        return assertNoFabricatedFacts({ output, context });

tests:

  # ─────────────────────────────────────────
  # BILLING — 20 test cases
  # ─────────────────────────────────────────

  - description: "billing: payment terms — invoice due date"
    vars:
      query: "When is my invoice due?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "30 days"

  - description: "billing: late payment fee"
    vars:
      query: "What happens if I pay my invoice late?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "1.5%"

  - description: "billing: accepted payment methods"
    vars:
      query: "What payment methods do you accept?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "credit card"

  - description: "billing: subscription billing date"
    vars:
      query: "When will I be charged for my subscription?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "7 days"

  - description: "billing: failed payment retry"
    vars:
      query: "My payment failed. What happens now?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
