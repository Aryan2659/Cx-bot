        value: "billing address"

  - description: "billing: dispute investigation duration"
    vars:
      query: "How long does a billing dispute investigation take?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
