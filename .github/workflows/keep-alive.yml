name: Keep CX Bot Alive

on:
  schedule:
    # Runs every 30 minutes. GitHub may delay this slightly under load,
    # but it will never exceed the 48h HF sleep window.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CX Bot health endpoint
        run: |
          echo "Pinging https://rnyx-cx-bot.hf.space/health"
          curl -fsS --max-time 30 https://rnyx-cx-bot.hf.space/health
