        value: "3 days"

  - description: "billing: account suspension after failed payments"
    vars:
      query: "How many failed payments before my account gets suspended?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "3"

  - description: "billing: full refund eligibility window"
    vars:
      query: "How long do I have to get a full refund?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
