        value: "7 days"

  - description: "billing: duplicate charge contact instruction"
    vars:
      query: "I see a duplicate charge on my account. What should I do?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "invoice number"

  - description: "billing: bank transfer as payment"
    vars:
      query: "Can I pay by bank transfer?"
      expected_agent: "billing"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
