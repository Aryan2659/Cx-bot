      - type: icontains
        value: "non-returnable"

  - description: "returns: personalized items policy"
    vars:
      query: "I ordered a personalized item. Can I return it?"
      expected_agent: "returns"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
        value: "non-returnable"

  - description: "returns: exchange price difference handling"
    vars:
      query: "If I exchange for something more expensive, how is the price difference handled?"
      expected_agent: "returns"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
