  # ─────────────────────────────────────────
  # ESCALATION — 10 test cases
  # ─────────────────────────────────────────

  - description: "escalation: unresolved after 2 contacts"
    vars:
      query: "I've contacted support twice and my issue still isn't resolved. What happens now?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
        value: "escalat"

  - description: "escalation: request for manager"
    vars:
      query: "I want to speak to a manager."
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
        value: "senior"

  - description: "escalation: P1 SLA — critical response time"
    vars:
      query: "What is the response time for a critical safety issue?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "2 hours"

  - description: "escalation: P2 SLA — high priority billing"
    vars:
      query: "How long until someone responds to a high-priority billing dispute over $200?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "4 hours"

  - description: "escalation: P3 standard SLA"
    vars:
      query: "What is the standard resolution time for a general unresolved issue?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "5 business days"

  - description: "escalation: compensation — service credit"
    vars:
      query: "What compensation can I get for a service failure?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
        value: "service credit"

  - description: "escalation: max partial refund"
    vars:
      query: "What is the maximum partial refund I can receive as compensation?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "25%"

  - description: "escalation: GDPR complaint contact"
    vars:
      query: "I have a data privacy complaint under GDPR. Who do I contact?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "dpo@company.com"

  - description: "escalation: high-value transaction trigger"
    vars:
      query: "My transaction is over $500 and unresolved. What process applies?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
        value: "escalat"

  - description: "escalation: ticket notification process"
    vars:
      query: "How will I be notified after my issue is escalated?"
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: icontains
        value: "ticket"

  # ─────────────────────────────────────────
  # EDGE CASES — 5 test cases
  # ─────────────────────────────────────────

  - description: "edge: ambiguous billing/returns overlap"
    vars:
      query: "I returned an item 10 days ago and still haven't received my refund. Who handles this?"
    assert:
      - type: javascript
        value: |
          const sources = context?.metadata?.sources ?? [];
          return {
            pass: sources.length > 0,
            score: sources.length > 0 ? 1 : 0,
            reason: sources.length > 0 ? "Has sources for cross-domain query" : "No sources on cross-domain query"
          };

  - description: "edge: PII in query — should still answer"
    vars:
      query: "My email is test@example.com and I want to know about your return window."
      expected_agent: "returns"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "30 days"

  - description: "edge: completely out of domain question"
    vars:
      query: "What is the capital of France?"
    assert:
      - type: javascript
        value: |
          // For OOD queries, confidence should be low OR it should be escalated
          const agent = context?.metadata?.agent;
          const confidence = context?.metadata?.confidence ?? 1;
          const handled = agent === "escalation" || confidence < 0.65;
          return {
            pass: handled,
            score: handled ? 1 : 0,
            reason: handled
              ? `OOD query correctly handled (agent=${agent}, confidence=${confidence.toFixed(2)})`
              : `OOD query not flagged (agent=${agent}, confidence=${confidence.toFixed(2)})`
          };

  - description: "edge: very short query"
    vars:
      query: "refund?"
    assert:
      - type: javascript
        value: |
          // Short queries should still get a valid response, not error
          return {
            pass: output.length > 20,
            score: output.length > 20 ? 1 : 0,
            reason: output.length > 20 ? "Got meaningful response to short query" : "Response too short"
          };

  - description: "edge: legal/compliance escalation trigger"
    vars:
      query: "I am considering legal action over my unresolved complaint."
      expected_agent: "escalation"
    assert:
      - type: javascript
        value: |
          const { assertCorrectAgent } = require('./assertions.js');
          return assertCorrectAgent({ output, context });
      - type: contains
        value: "Priority 1"

# ─────────────────────────────────────────
# Output config
# ─────────────────────────────────────────
outputPath: results/latest.json
sharing: false
